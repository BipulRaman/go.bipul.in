<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <!-- Tell intermediaries not to cache this HTML either. -->
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Bipul's URL Manager</title>

    <!-- Perf: warm up DNS / TLS / TCP to the CSV origin and the host Google
         redirects the published CSV to. No data is cached — these only set up
         the connection. -->
    <link rel="preconnect" href="https://docs.google.com" crossorigin />
    <link rel="preconnect" href="https://googleusercontent.com" crossorigin />
    <link rel="dns-prefetch" href="https://docs.google.com" />
    <link rel="dns-prefetch" href="https://googleusercontent.com" />

    <link rel="shortcut icon" type="image/x-icon" href="https://cdn.bipul.in/bipul.in/images/favicon.ico" />

    <!-- Perf: kick the fetch off as early as possible (in <head>, before body
         parsing finishes) and share the in-flight promise with the main script.
         cache: 'no-store' ensures nothing is written to the HTTP cache. -->
    <script>
      (function () {
        'use strict';
        var CSV_URL =
          'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7R5Hk0hMNwXxduL3-_WXc952jaeAvOcd1XpYWETiD1nye-GO86NSQmDh8XdlZoz4SRjuxE0GGQ9uF/pub?output=csv';
        window.__CSV_URL__ = CSV_URL;

        window.__CSV_PROMISE__ = fetch(CSV_URL, {
          cache: 'no-store',
          credentials: 'omit'
        }).then(function (res) {
          if (!res.ok) throw new Error('CSV fetch failed: ' + res.status);
          return res.text();
        });
      })();
    </script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #ffffff;
      }

      body {
        font-family: 'Consolas', 'Courier New', monospace;
        color: rgb(60, 60, 60);
      }

      .container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1rem;
      }

      h1 {
        font-weight: 500;
        font-size: clamp(1.25rem, 4vw, 2rem);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <main class="container">
      <h1 id="status">Redirecting.. 🚀</h1>
    </main>

    <script>
      (function () {
        'use strict';

        var statusEl = document.getElementById('status');

        function setStatus(text) {
          if (statusEl) statusEl.textContent = text;
        }

        // RFC 4180-friendly CSV parser. Handles quoted fields, escaped quotes ("")
        // and CR/LF line endings.
        function parseCsv(text) {
          var rows = [];
          var row = [];
          var field = '';
          var inQuotes = false;

          for (var i = 0; i < text.length; i++) {
            var ch = text.charAt(i);

            if (inQuotes) {
              if (ch === '"') {
                if (text.charAt(i + 1) === '"') {
                  field += '"';
                  i++;
                } else {
                  inQuotes = false;
                }
              } else {
                field += ch;
              }
              continue;
            }

            if (ch === '"') {
              inQuotes = true;
            } else if (ch === ',') {
              row.push(field);
              field = '';
            } else if (ch === '\n' || ch === '\r') {
              if (ch === '\r' && text.charAt(i + 1) === '\n') i++;
              row.push(field);
              rows.push(row);
              row = [];
              field = '';
            } else {
              field += ch;
            }
          }

          if (field.length > 0 || row.length > 0) {
            row.push(field);
            rows.push(row);
          }

          return rows.filter(function (r) {
            return r.length > 0 && r.some(function (c) { return c !== ''; });
          });
        }

        function csvToMap(text) {
          var rows = parseCsv(text);
          if (rows.length === 0) return {};

          var header = rows[0].map(function (h) { return h.trim().toLowerCase(); });
          var slugIdx = header.indexOf('slug');
          var urlIdx = header.indexOf('url');
          if (slugIdx === -1 || urlIdx === -1) return {};

          var map = {};
          for (var i = 1; i < rows.length; i++) {
            var slug = (rows[i][slugIdx] || '').trim().toLowerCase();
            var url = (rows[i][urlIdx] || '').trim();
            if (slug && url) map[slug] = url;
          }
          return map;
        }

        function getSlug() {
          return decodeURIComponent((window.location.hash || '').substring(1)).trim();
        }

        function isSafeUrl(url) {
          // Allow only http(s) destinations to avoid javascript: / data: redirects.
          return /^https?:\/\//i.test(url);
        }

        function redirect() {
          var slug = getSlug();
          if (!slug) {
            setStatus('No link specified. 😶');
            return;
          }

          (window.__CSV_PROMISE__ || Promise.reject(new Error('no promise')))
            .then(function (text) {
              var url = csvToMap(text)[slug.toLowerCase()];
              if (url && isSafeUrl(url)) {
                window.location.replace(url);
              } else {
                setStatus('Destination does not exist! 😶');
              }
            })
            .catch(function () {
              setStatus('Failed to load redirect data. ⚠️');
            });
        }

        redirect();

        // On hash change, refetch (also no-store) so a new slug uses fresh data.
        window.addEventListener('hashchange', function () {
          window.__CSV_PROMISE__ = fetch(window.__CSV_URL__, {
            cache: 'no-store',
            credentials: 'omit'
          }).then(function (res) {
            if (!res.ok) throw new Error('CSV fetch failed: ' + res.status);
            return res.text();
          });
          redirect();
        });

        // Defer analytics until the page is idle so it can't compete with the
        // redirect path for bandwidth or main-thread time.
        function loadAnalytics() {
          if (window.__GA_LOADED__) return;
          window.__GA_LOADED__ = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-1S6P08JBEH';
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          function gtag() { window.dataLayer.push(arguments); }
          gtag('js', new Date());
          gtag('config', 'G-1S6P08JBEH');
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadAnalytics, { timeout: 3000 });
        } else {
          window.addEventListener('load', function () { setTimeout(loadAnalytics, 1500); });
        }
      })();
    </script>
  </body>
</html>
